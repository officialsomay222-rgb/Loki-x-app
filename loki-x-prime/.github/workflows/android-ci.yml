name: Android Kotlin CI

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Native Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./Loki-Android/gradlew || true

      - name: Build with Gradle (APK)
        working-directory: ./Loki-Android
        run: ./gradlew assembleDebug --stacktrace
        # Note: If wrapper is missing, use gradle directly
        # run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: loki-x-prime-debug-apk
          path: Loki-Android/app/build/outputs/apk/debug/app-debug.apk
