<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #08080c; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
  .devil-sticker-mask {
    width: 300px;
    height: 300px;
    -webkit-mask-image: url('/assets/icon.png');
    -webkit-mask-size: contain;
    -webkit-mask-repeat: no-repeat;
    -webkit-mask-position: center;
    mask-image: url('/assets/icon.png');
    mask-size: contain;
    mask-repeat: no-repeat;
    mask-position: center;
    
    background: repeating-radial-gradient(
      circle at center,
      #ff0000 0%,
      #ff7f00 5%,
      #ffff00 10%,
      #00ff00 15%,
      #00f0ff 20%,
      #bd00ff 25%,
      #ff00ff 30%,
      #ff0000 35%
    );
    background-size: 200% 200%;
    background-position: center;
    animation: rgb-spread 3s linear infinite;
  }
  
  @keyframes rgb-spread {
    0% { background-size: 50% 50%; }
    100% { background-size: 200% 200%; }
  }
</style>
</head>
<body>
  <div class="devil-sticker-mask"></div>
</body>
</html>
